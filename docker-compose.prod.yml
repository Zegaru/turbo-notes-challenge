services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-notes}
      POSTGRES_USER: ${POSTGRES_USER:-notes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-notes} -d ${POSTGRES_DB:-notes}']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend:
    build: ./backend
    command: ['sh', '-c', 'gunicorn config.wsgi:application --bind 0.0.0.0:${PORT:-8000}']
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-notes}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-notes}
      PORT: ${PORT:-8000}
      MEDIA_ROOT: /data/media
      STATIC_ROOT: /app/staticfiles
      DEBUG: 'false'
    volumes:
      - media_data:/data
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -f -s http://127.0.0.1:${PORT:-8000}/health/ || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  postgres_data:
  media_data:
